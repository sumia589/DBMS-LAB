<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>My Appointments - MediCare</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="/css/style.css">
<style>body{background:#f0f4f8;}.patient-layout{display:flex;min-height:100vh;}.patient-sidebar{width:240px;min-width:240px;background:var(--dark);position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;}.patient-sidebar .sb{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;text-decoration:none;}.patient-sidebar .bi{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;}.patient-sidebar h2{font-family:'Playfair Display',serif;font-size:15px;color:white;}nav{padding:12px 10px;}.p-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;font-weight:500;transition:var(--transition);margin-bottom:2px;}.p-link:hover,.p-link.active{background:var(--primary);color:white;}.p-link i{width:16px;text-align:center;}.p-main{margin-left:240px;flex:1;}.p-topbar{background:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06);}.p-topbar h1{font-size:18px;font-weight:700;color:var(--dark);}.p-content{padding:24px;}.p-sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);}.p-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px;}.p-av{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;}</style>
</head><body><div class="patient-layout">
<aside class="patient-sidebar">
<a href="/" class="sb"><div class="bi"><i class="fas fa-plus"></i></div><div><h2>MediCare</h2></div></a>
<nav><a href="/patient/dashboard.html" class="p-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a><a href="/appointments.html" class="p-link"><i class="fas fa-calendar-plus"></i> Book Appointment</a><a href="/patient/appointments.html" class="p-link active"><i class="fas fa-calendar-check"></i> My Appointments</a><a href="/patient/records.html" class="p-link"><i class="fas fa-file-medical"></i> Medical Records</a><a href="/patient/profile.html" class="p-link"><i class="fas fa-user"></i> My Profile</a><a href="/doctors.html" class="p-link"><i class="fas fa-user-md"></i> Find Doctors</a></nav>
<div class="p-sf"><div class="p-user"><div class="p-av" id="p-initials">P</div><div><div style="font-size:13px;font-weight:600;color:white;" id="p-name">Patient</div><div style="font-size:11px;color:rgba(255,255,255,.4);">Patient</div></div></div><button onclick="logout()" class="p-link" style="width:100%;border:none;cursor:pointer;background:rgba(255,0,0,.1);color:#f87171;"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
</aside>
<div class="p-main"><div class="p-topbar"><h1>My Appointments</h1><a href="/appointments.html" class="btn btn-primary btn-sm"><i class="fas fa-calendar-plus"></i> Book New</a></div>
<div class="p-content">
<div class="filters-bar"><select class="filter-select" onchange="filterAppts(this.value)"><option value="">All</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div>
<div style="display:flex;flex-direction:column;gap:16px;" id="appts-list"><div class="loading"><div class="spinner"></div></div></div>
</div></div></div>
<script src="/js/main.js"></script>
<script>
let allAppts=[];
async function init(){const user=await checkAuth('patient');if(!user)return;document.getElementById('p-name').textContent=user.full_name;document.getElementById('p-initials').textContent=getInitials(user.full_name);const res=await apiGet('/my-appointments');allAppts=res.data||[];render(allAppts);}
function filterAppts(status){render(status?allAppts.filter(a=>a.status===status):allAppts);}
function render(appts){const el=document.getElementById('appts-list');
el.innerHTML=appts.length?appts.map(a=>`<div style="background:white;border-radius:16px;padding:24px;box-shadow:var(--shadow-sm);border-left:4px solid ${a.status==='pending'?'var(--warning)':a.status==='confirmed'?'var(--info)':a.status==='completed'?'var(--success)':'var(--gray-300)'};">
<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;">
<div style="display:flex;gap:16px;align-items:center;">
<div style="width:54px;height:54px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-size:22px;"><i class="fas fa-user-md"></i></div>
<div><div style="font-weight:700;font-size:16px;">${a.doctor_name}</div><div style="font-size:13px;color:var(--primary);margin:3px 0;">${a.specialization}</div><div style="font-size:12px;color:var(--gray-400);">${a.department_name||''}</div></div></div>
<div style="text-align:right;">${getStatusBadge(a.status)}<div style="font-size:13px;font-weight:600;color:var(--dark);margin-top:6px;">${formatDate(a.appointment_date)}</div><div style="font-size:13px;color:var(--primary);">${formatTime(a.appointment_time)}</div></div></div>
<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
<div style="font-size:13px;color:var(--gray-500);"><span class="badge badge-info">${capitalize(a.type)}</span>${a.symptoms?` &bull; <em>${a.symptoms}</em>`:''}</div>
${a.status==='pending'||a.status==='confirmed'?`<button onclick="cancel(${a.id})" class="btn btn-danger btn-sm"><i class="fas fa-times"></i> Cancel</button>`:''}
</div></div>`).join(''):'<div style="text-align:center;color:var(--gray-400);padding:60px 20px;background:white;border-radius:16px;"><i class="fas fa-calendar" style="font-size:48px;margin-bottom:16px;display:block;"></i><h3>No appointments found</h3><a href="/appointments.html" class="btn btn-primary btn-sm" style="margin-top:16px;">Book Appointment</a></div>';}
async function cancel(id){if(!confirm('Cancel this appointment?'))return;const res=await apiPut(`/appointments/${id}/cancel`,{});if(res.success){showToast(res.message,'success');init();}else showToast(res.message,'error');}
init();
</script></body></html>
