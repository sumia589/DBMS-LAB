<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Medical Records - MediCare</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="/css/style.css">
<style>body{background:#f0f4f8;}.patient-layout{display:flex;min-height:100vh;}.patient-sidebar{width:240px;min-width:240px;background:var(--dark);position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:100;}.patient-sidebar .sb{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;text-decoration:none;}.patient-sidebar .bi{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;}.patient-sidebar h2{font-family:'Playfair Display',serif;font-size:15px;color:white;}nav{padding:12px 10px;}.p-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;font-weight:500;transition:var(--transition);margin-bottom:2px;}.p-link:hover,.p-link.active{background:var(--primary);color:white;}.p-link i{width:16px;text-align:center;}.p-main{margin-left:240px;flex:1;}.p-topbar{background:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06);}.p-topbar h1{font-size:18px;font-weight:700;color:var(--dark);}.p-content{padding:24px;}.p-sf{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);}.p-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px;}.p-av{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;}</style>
</head><body><div class="patient-layout">
<aside class="patient-sidebar"><a href="/" class="sb"><div class="bi"><i class="fas fa-plus"></i></div><div><h2>MediCare</h2></div></a>
<nav><a href="/patient/dashboard.html" class="p-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a><a href="/appointments.html" class="p-link"><i class="fas fa-calendar-plus"></i> Book Appointment</a><a href="/patient/appointments.html" class="p-link"><i class="fas fa-calendar-check"></i> My Appointments</a><a href="/patient/records.html" class="p-link active"><i class="fas fa-file-medical"></i> Medical Records</a><a href="/patient/profile.html" class="p-link"><i class="fas fa-user"></i> My Profile</a><a href="/doctors.html" class="p-link"><i class="fas fa-user-md"></i> Find Doctors</a></nav>
<div class="p-sf"><div class="p-user"><div class="p-av" id="p-initials">P</div><div><div style="font-size:13px;font-weight:600;color:white;" id="p-name">Patient</div></div></div><button onclick="logout()" class="p-link" style="width:100%;border:none;cursor:pointer;background:rgba(255,0,0,.1);color:#f87171;"><i class="fas fa-sign-out-alt"></i> Logout</button></div></aside>
<div class="p-main"><div class="p-topbar"><h1>Medical Records</h1></div><div class="p-content">
<div style="display:flex;flex-direction:column;gap:16px;" id="records-list"><div class="loading"><div class="spinner"></div></div></div>
</div></div></div>
<script src="/js/main.js"></script>
<script>
async function init(){const user=await checkAuth('patient');if(!user)return;document.getElementById('p-name').textContent=user.full_name;document.getElementById('p-initials').textContent=getInitials(user.full_name);
const res=await apiGet('/my-records');const recs=res.data||[];const el=document.getElementById('records-list');
el.innerHTML=recs.length?recs.map(r=>`<div style="background:white;border-radius:16px;padding:24px;box-shadow:var(--shadow-sm);">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--gray-100);">
<div style="display:flex;align-items:center;gap:14px;"><div style="width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;color:white;font-size:18px;"><i class="fas fa-file-medical"></i></div>
<div><div style="font-weight:700;font-size:15px;">Medical Record</div><div style="font-size:13px;color:var(--primary);">Dr. ${r.doctor_name} &bull; ${r.specialization||''}</div></div></div>
<div style="font-size:13px;color:var(--gray-400);">${formatDate(r.record_date)}</div></div>
${r.diagnosis?`<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-bottom:6px;">Diagnosis</div><div style="font-size:14px;color:var(--dark);background:var(--gray-100);padding:12px;border-radius:8px;">${r.diagnosis}</div></div>`:''}
${r.prescription?`<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-bottom:6px;">Prescription</div><div style="font-size:14px;color:var(--dark);background:var(--gray-100);padding:12px;border-radius:8px;">${r.prescription}</div></div>`:''}
${r.test_results?`<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-bottom:6px;">Test Results</div><div style="font-size:14px;color:var(--dark);background:var(--gray-100);padding:12px;border-radius:8px;">${r.test_results}</div></div>`:''}
${r.notes?`<div><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-500);margin-bottom:6px;">Notes</div><div style="font-size:14px;color:var(--dark);background:var(--gray-100);padding:12px;border-radius:8px;">${r.notes}</div></div>`:''}
</div>`).join(''):'<div style="text-align:center;color:var(--gray-400);padding:60px 20px;background:white;border-radius:16px;"><i class="fas fa-file-medical" style="font-size:48px;margin-bottom:16px;display:block;"></i><h3>No medical records found</h3></div>';}
init();
</script></body></html>
