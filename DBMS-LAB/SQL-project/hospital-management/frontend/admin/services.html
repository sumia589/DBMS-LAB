<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Services - Admin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/admin.css"></head>
<body><div class="admin-layout">
<aside class="sidebar" id="sidebar"><a href="/" class="sidebar-brand"><div class="brand-icon"><i class="fas fa-plus"></i></div><div><h2>MediCare</h2><p>Admin Panel</p></div></a><nav class="sidebar-nav"><a href="/admin/dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a><div class="nav-section-title">Management</div><a href="/admin/doctors.html" class="sidebar-link"><i class="fas fa-user-md"></i> Doctors</a><a href="/admin/patients.html" class="sidebar-link"><i class="fas fa-users"></i> Patients</a><a href="/admin/appointments.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Appointments</a><a href="/admin/departments.html" class="sidebar-link"><i class="fas fa-hospital"></i> Departments</a><a href="/admin/services.html" class="sidebar-link active"><i class="fas fa-stethoscope"></i> Services</a><a href="/admin/records.html" class="sidebar-link"><i class="fas fa-file-medical"></i> Medical Records</a><div class="nav-section-title">Content</div><a href="/admin/news.html" class="sidebar-link"><i class="fas fa-newspaper"></i> News</a><a href="/admin/testimonials.html" class="sidebar-link"><i class="fas fa-star"></i> Testimonials</a><a href="/admin/messages.html" class="sidebar-link"><i class="fas fa-envelope"></i> Messages</a><a href="/admin/settings.html" class="sidebar-link"><i class="fas fa-cog"></i> Settings</a></nav>
<div class="sidebar-footer"><div class="admin-user"><div class="admin-avatar" id="admin-initials">A</div><div class="admin-user-info"><div class="name" id="admin-name">Admin</div><div class="role">Administrator</div></div></div><button onclick="logout()" class="sidebar-link" style="width:100%;border:none;cursor:pointer;background:rgba(255,0,0,.1);color:#f87171;"><i class="fas fa-sign-out-alt"></i> Logout</button></div></aside>
<div class="main-content"><div class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><div class="topbar-left"><h1>Services</h1><p>Manage hospital services</p></div></div><button class="btn btn-primary btn-sm" onclick="openModal('svc-modal')"><i class="fas fa-plus"></i> Add Service</button></div>
<div class="page-content"><div class="data-card"><div class="table-wrapper"><table><thead><tr><th>Service</th><th>Department</th><th>Price</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead><tbody id="svc-table"><tr><td colspan="6" class="text-center"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div></div></div></div></div>

<div class="modal-overlay" id="svc-modal"><div class="modal"><div class="modal-header"><h2 id="svc-title">Add Service</h2><button class="modal-close" onclick="closeModal('svc-modal')"><i class="fas fa-times"></i></button></div>
<div class="modal-body"><input type="hidden" id="svc-id">
<div class="form-row"><div class="form-group"><label class="form-label">Name *</label><input type="text" id="svc-name" class="form-control" placeholder="Service name"></div><div class="form-group"><label class="form-label">Department</label><select id="svc-dept" class="form-control"><option value="">General</option></select></div></div>
<div class="form-group"><label class="form-label">Description</label><textarea id="svc-desc" class="form-control" placeholder="Service description..."></textarea></div>
<div class="form-row"><div class="form-group"><label class="form-label">Price (৳)</label><input type="number" id="svc-price" class="form-control" placeholder="1000"></div><div class="form-group"><label class="form-label">Duration (minutes)</label><input type="number" id="svc-duration" class="form-control" placeholder="30"></div></div>
<div class="form-group"><label class="form-label">Icon (FontAwesome)</label><input type="text" id="svc-icon" class="form-control" value="fa-stethoscope" placeholder="fa-heartbeat"></div>
</div><div class="modal-footer"><button class="btn btn-outline btn-sm" onclick="closeModal('svc-modal')">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveSvc()"><i class="fas fa-save"></i> Save</button></div></div></div>

<script src="/js/main.js"></script>
<script>
let services=[],depts=[];
async function init(){const user=await checkAuth('admin');if(!user)return;document.getElementById('admin-name').textContent=user.full_name;document.getElementById('admin-initials').textContent=getInitials(user.full_name);
const dr=await apiGet('/departments');depts=dr.data||[];depts.forEach(d=>document.getElementById('svc-dept').innerHTML+=`<option value="${d.id}">${d.name}</option>`);
load();}
async function load(){const res=await apiGet('/services');services=res.data||[];render();}
function render(){const tb=document.getElementById('svc-table');
tb.innerHTML=services.length?services.map(s=>`<tr><td><div style="display:flex;align-items:center;gap:10px;"><div style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;"><i class="fas ${s.icon||'fa-stethoscope'}"></i></div><span style="font-weight:600;font-size:14px;">${s.name}</span></div></td><td style="font-size:13px;">${s.department_name||'General'}</td><td style="font-weight:600;color:var(--primary);">${formatCurrency(s.price)}</td><td style="font-size:13px;">${s.duration_minutes?s.duration_minutes+' min':'—'}</td><td><span class="badge ${s.is_active?'badge-success':'badge-danger'}">${s.is_active?'Active':'Inactive'}</span></td><td><div style="display:flex;gap:6px;"><button class="action-btn edit" onclick="edit(${s.id})"><i class="fas fa-edit"></i></button><button class="action-btn delete" onclick="del(${s.id},'${s.name}')"><i class="fas fa-trash"></i></button></div></td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:40px;">No services found</td></tr>';}
function edit(id){const s=services.find(x=>x.id==id);if(!s)return;document.getElementById('svc-title').textContent='Edit Service';document.getElementById('svc-id').value=s.id;document.getElementById('svc-name').value=s.name;document.getElementById('svc-dept').value=s.department_id||'';document.getElementById('svc-desc').value=s.description||'';document.getElementById('svc-price').value=s.price||0;document.getElementById('svc-duration').value=s.duration_minutes||'';document.getElementById('svc-icon').value=s.icon||'fa-stethoscope';openModal('svc-modal');}
async function saveSvc(){const id=document.getElementById('svc-id').value;const data={name:document.getElementById('svc-name').value,description:document.getElementById('svc-desc').value,price:document.getElementById('svc-price').value,duration_minutes:document.getElementById('svc-duration').value,department_id:document.getElementById('svc-dept').value,icon:document.getElementById('svc-icon').value};
const res=id?await apiPut(`/admin/services/${id}`,data):await apiPost('/admin/services',data);
if(res.success){showToast(res.message,'success');closeModal('svc-modal');document.getElementById('svc-id').value='';load();}else showToast(res.message,'error');}
async function del(id,name){if(!confirm(`Delete ${name}?`))return;const res=await apiDelete(`/admin/services/${id}`);if(res.success){showToast(res.message,'success');load();}else showToast(res.message,'error');}
init();
</script></body></html>
